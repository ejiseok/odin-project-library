<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Project Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="new-book-btn">New Book</button>

  <dialog class="create-book-modal">
    <form action="#" method="post">
      <label for="title">Title: </label>
      <input type="text" name="title" id="title">
      <label for="pages">Pages: </label>
      <input type="number" name="pages" id="pages">
      <label for="readed">Readed: </label>
      <input type="checkbox" name="readed" id="readed">
      <div class="modal-btn-container">
        <button type="submit" class="modal-add-btn">Add</button>
        <button type="button" class="modal-close-btn">Close</button>
      </div>
    </form>
  </dialog>

  <div class="book-container">
    <div class="book">
      <div class="title">test</div>
      <div class="pages">123</div>
      <div class="book-btn-container">
        <button class="readed-btn">Readed</button>
        <button class="delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
